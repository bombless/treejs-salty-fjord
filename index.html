<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salty Fjord - Three.js</title>
    <style>
      :root {
        --bg: #0d1a24;
        --panel-bg: rgba(10, 24, 34, 0.55);
        --panel-border: rgba(175, 220, 255, 0.28);
        --text: #d7efff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at 20% 10%, #1d3244, var(--bg) 55%);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        color: var(--text);
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px 14px;
        backdrop-filter: blur(8px);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
        user-select: none;
      }

      .hud h1 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 12px;
        opacity: 0.86;
      }

      .hud .row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }

      .hud input[type="checkbox"] {
        width: 14px;
        height: 14px;
        accent-color: #7cc7ff;
      }

      .hud button {
        appearance: none;
        border: 1px solid var(--panel-border);
        background: rgba(124, 199, 255, 0.14);
        color: var(--text);
        border-radius: 8px;
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
        transition: background 120ms ease, transform 120ms ease;
      }

      .hud button:hover {
        background: rgba(124, 199, 255, 0.22);
      }

      .hud button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud">
      <h1>Salty Fjord</h1>
      <p>Drag to orbit, scroll to zoom</p>
      <div class="row">
        <input id="sun-toggle" type="checkbox" checked />
        <label for="sun-toggle">Sun Light</label>
      </div>
      <div class="row">
        <button id="fullscreen-toggle" type="button">Enter Fullscreen</button>
      </div>
      <p id="sun-status">Sun: ON (press L)</p>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
