<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salty Fjord - Three.js</title>
    <style>
      :root {
        --bg: #0d1a24;
        --panel-bg: rgba(10, 24, 34, 0.55);
        --panel-border: rgba(175, 220, 255, 0.28);
        --text: #d7efff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at 20% 10%, #1d3244, var(--bg) 55%);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        color: var(--text);
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px 14px;
        backdrop-filter: blur(8px);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
        user-select: none;
      }

      .hud h1 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hud p {
        margin: 6px 0 0;
        font-size: 12px;
        opacity: 0.86;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud">
      <h1>Salty Fjord</h1>
      <p>Drag to orbit, scroll to zoom</p>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
